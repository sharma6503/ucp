server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Use Google DNS for resolving upstream Cloud Run URLs at runtime
    resolver 8.8.8.8 valid=30s ipv6=off;

    # Increase proxy buffer sizes to handle Cloud Run's large response headers
    proxy_buffer_size          128k;
    proxy_buffers              8 256k;
    proxy_busy_buffers_size    256k;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Proxy POST /api → backend Cloud Run service root /
    # BACKEND_URL_PLACEHOLDER is replaced at container startup via start.sh
    # Using set $backend to force runtime DNS resolution (required with resolver directive)
    location = /api {
        set $backend "BACKEND_URL_PLACEHOLDER";
        # Rewrite: strip /api and forward to backend root
        proxy_pass $backend/;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_set_header Host ucp-business-agent-mhff4zrwlq-uc.a.run.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
    }

    # Serve static assets with caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — send all unknown routes to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
